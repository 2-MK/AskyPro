<!DOCTYPE html>
<html>

<head>

    <title>Matrix Vision</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <canvas id="matrix-bg"></canvas>

    <div class="container">

        <div class="header">

            <h1>MATRIX VISION</h1>

            <button id="startBtn">
                INITIALIZE CAMERA
            </button>

            <div class="status">
                SYSTEM STATUS: ONLINE | ASCII LINK ESTABLISHED
            </div>

        </div>

        <video
            id="video"
            autoplay
            playsinline>
        </video>

        <canvas id="canvas"></canvas>

        <pre id="ascii"></pre>

    </div>

    <script src="app.js"></script>

</body>

</html>
